<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Money bag body -->
  <ellipse cx="32" cy="42" rx="16" ry="14" fill="url(#bag)"/>
  <!-- Bag neck -->
  <path d="M24 30 Q32 24 40 30" fill="none" stroke="#FFA500" stroke-width="3"/>
  <!-- Tie ribbon -->
  <rect x="29" y="26" width="6" height="6" rx="2" fill="#8B4513"/>
  <!-- Dollar sign -->
  <text x="32" y="47" text-anchor="middle" font-size="20" font-weight="bold" font-family="Arial, sans-serif" fill="#8B4513">$</text>
</svg>
